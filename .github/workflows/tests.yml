name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # The test suite mocks the external tools, but install them for parity with a
      # real environment (and for any future tests that shell out for real).
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libimage-exiftool-perl imagemagick ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest coverage

      # Must run from the repo root; pytest.ini sets testpaths and ignores archive/.
      # Coverage config (branch + the two prep source files) is in .coveragerc.
      - name: Run tests with coverage
        run: |
          coverage run -m pytest -q
          coverage report
          coverage report --fail-under=80
