name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Most tests mock the external tools, but the real-tool integration tests
      # (test_calibration_execution_real.py) drive the actual exiftool + ImageMagick to validate
      # the executor's safety assumption (an EXIF write preserves the decoded-content fingerprint).
      # Those tests skip when the tools are absent, so installing them here is what exercises them.
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libimage-exiftool-perl imagemagick ffmpeg
          exiftool -ver && identify -version | head -1   # fail fast if either is missing

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest coverage

      # Must run from the repo root; pytest.ini sets testpaths and ignores archive/.
      # Coverage config (branch + the two prep source files) is in .coveragerc.
      - name: Run tests with coverage
        run: |
          coverage run -m pytest -q
          coverage report
          coverage report --fail-under=80
