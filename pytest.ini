[pytest]
# The active test suite lives in . Tests must run from the repo root, so `` lands on
# sys.path (conftest) and the `cartographer` package imports; some tests also reference repo-root
# paths like cartographer/photos_1_prep.py.
testpaths = tests cartographer/editor/tests
norecursedirs = .git
markers =
    slow: tests that decode large real fixtures (full-size JPEG / RAW). Skipped by the
        pre-push hook (`-m "not slow"`); CI runs the full suite.
    spec(clause_id): maps a test to the spec clause id it covers (the spec-coverage map; see
        spec/spec-clauses.json + tools/spec-coverage). An affordance for tracking clause coverage,
        not a quality score — the real assertion still lives in the test body.
