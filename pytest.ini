[pytest]
# The active test suite lives in ingest/. Tests must run from the repo root, so `ingest/` lands on
# sys.path (conftest) and the `photos_pipeline` package imports; some tests also reference repo-root
# paths like ingest/photos_pipeline/photos_1_prep.py.
testpaths = ingest/tests ingest/photos_pipeline/editor/tests
norecursedirs = .git
markers =
    slow: tests that decode large real fixtures (full-size JPEG / RAW). Skipped by the
        pre-push hook (`-m "not slow"`); CI runs the full suite.
