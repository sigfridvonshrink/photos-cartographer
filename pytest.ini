[pytest]
# The active test suite lives in ingest/. Tests must run from the repo root,
# since some reference paths like ingest/photos-1-prep relative to it.
# archive/ holds inert reference material whose tests are intentionally not collected.
testpaths = ingest/tests develop/tests
norecursedirs = archive .git
markers =
    slow: tests that decode large real fixtures (full-size JPEG / RAW). Skipped by the
        pre-push hook (`-m "not slow"`); CI runs the full suite.
