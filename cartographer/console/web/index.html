<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cartographer console</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="console.css">
</head>
<body>
  <header id="topbar">
    <strong class="title">Cartographer</strong>
    <span id="workspace" class="ws"></span>
    <span class="grow"></span>
    <span id="lock" class="lock"></span>
    <div class="seg" id="tabs">
      <button data-phase="prep" class="on">Prep</button>
      <button data-phase="geotag">Geotag</button>
      <button data-phase="merge">Merge</button>
      <button data-phase="edit" disabled title="coming in v2.4">Edit</button>
    </div>
  </header>

  <main>
    <div class="actions">
      <span id="phase-status" class="chip">—</span>
      <span class="grow"></span>
      <span id="action-buttons" class="action-buttons"></span>
    </div>

    <section class="progress">
      <p class="cap">Progress</p>
      <div id="prog-list" class="prog-list"><p class="idle">No active task.</p></div>
    </section>

    <section class="logwrap">
      <p class="cap">Log <button id="clear" class="mini">clear</button></p>
      <pre id="log" class="log" aria-live="polite"></pre>
    </section>
  </main>

  <div id="gate-overlay" class="gate-overlay" hidden>
    <div class="gate" role="dialog" aria-modal="true" aria-labelledby="gate-title">
      <p class="gate-title" id="gate-title">Confirm execute</p>
      <div id="gate-sum" class="gate-sum"></div>
      <p class="gate-warn">Moves irreplaceable originals. No-clobber enforced; duplicates are
        quarantined, never deleted.</p>
      <div class="gate-act">
        <button id="gate-cancel" class="btn">Cancel</button>
        <button id="gate-go" class="btn primary">Execute</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
